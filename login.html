<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPEI – Sign In</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
<link rel="icon" type="image/png" href="favicon.png" />

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1f3c;
    --navy-mid: #152850;
    --navy-light: #1e3a6e;
    --accent: #2e7df7;
    --accent-light: #5a9bff;
    --white: #ffffff;
    --gray-soft: #f4f6fb;
    --gray-border: #dde3ef;
    --text-muted: #7a8aab;
  }
  * { font-family: 'DM Sans', sans-serif; }
  h1, h2, .logo-text { font-family: 'Sora', sans-serif; }

  body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }

  .left-panel {
    background: linear-gradient(145deg, var(--navy) 0%, var(--navy-mid) 50%, var(--navy-light) 100%);
    width: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .left-panel::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(46,125,247,0.15) 0%, transparent 70%);
    top: -100px; left: -100px;
  }
  .left-panel::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(46,125,247,0.1) 0%, transparent 70%);
    bottom: -80px; right: -80px;
  }
  .grid-overlay {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .logo-area { position: relative; z-index: 2; text-align: center; }
  .logo-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 20px 36px;
    margin-bottom: 28px;
    backdrop-filter: blur(10px);
  }
  .logo-text {
    font-size: 3rem; font-weight: 800; color: white; letter-spacing: -1px;
    line-height: 1;
  }
  .logo-text .v { color: white; }
  .logo-text .accent { color: var(--accent-light); }
  .brand-title {
    font-family: 'Sora', sans-serif;
    font-size: 1.75rem; font-weight: 700;
    color: white; text-align: center;
    line-height: 1.3; margin-bottom: 12px;
  }
  .brand-sub {
    font-size: 0.95rem; color: rgba(255,255,255,0.55);
    letter-spacing: 0.05em; text-transform: uppercase;
    font-weight: 500;
  }

  /* Floating particles */
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(46,125,247,0.3);
    animation: float 6s ease-in-out infinite;
  }
  .particle:nth-child(1) { width:8px;height:8px; top:20%;left:15%; animation-delay:0s; }
  .particle:nth-child(2) { width:5px;height:5px; top:60%;left:25%; animation-delay:2s; }
  .particle:nth-child(3) { width:10px;height:10px; top:40%;right:20%; animation-delay:1s; }
  .particle:nth-child(4) { width:6px;height:6px; top:75%;right:30%; animation-delay:3s; }
  @keyframes float {
    0%,100% { transform: translateY(0px); opacity: 0.4; }
    50% { transform: translateY(-20px); opacity: 0.8; }
  }

  .right-panel {
    width: 50%; display: flex; align-items: center; justify-content: center;
    background: var(--white);
    padding: 40px;
  }
  .form-card { width: 100%; max-width: 400px; }
  .form-title {
    font-family: 'Sora', sans-serif;
    font-size: 2rem; font-weight: 800;
    color: var(--navy); letter-spacing: -0.5px;
    text-align: center; margin-bottom: 36px;
  }
  .form-group { margin-bottom: 20px; }
  label {
    display: block; font-size: 0.875rem; font-weight: 500;
    color: #3a4a6b; margin-bottom: 8px;
  }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid var(--gray-border);
    border-radius: 10px; font-size: 0.95rem;
    color: var(--navy); background: var(--gray-soft);
    outline: none; transition: all 0.2s;
    box-sizing: border-box;
  }
  input[type="email"]:focus, input[type="password"]:focus {
    border-color: var(--accent); background: white;
    box-shadow: 0 0 0 3px rgba(46,125,247,0.12);
  }
  .password-wrapper { position: relative; }
  .password-wrapper input { padding-right: 46px; }
  .toggle-pwd {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); cursor: pointer;
    color: var(--text-muted); background: none; border: none;
    font-size: 1.1rem; padding: 0;
  }
  .form-options {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 28px; margin-top: 8px;
  }
  .forgot { font-size: 0.85rem; color: var(--accent); text-decoration: none; font-weight: 500; }
  .forgot:hover { text-decoration: underline; }
  .remember { display: flex; align-items: center; gap: 7px; font-size: 0.85rem; color: #3a4a6b; cursor: pointer; }
  .remember input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }

  .btn-signin {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white; font-family: 'Sora', sans-serif;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 0.1em;
    border: none; border-radius: 10px; cursor: pointer;
    transition: all 0.25s; box-shadow: 0 4px 15px rgba(13,31,60,0.3);
  }
  .btn-signin:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(13,31,60,0.4);
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--accent) 100%);
  }
  .btn-signin:active { transform: translateY(0); }

  .form-hint {
    text-align: center; margin-top: 20px;
    font-size: 0.82rem; color: var(--text-muted); line-height: 1.5;
  }

  .error-msg {
    background: #fff0f0; border: 1px solid #ffcdd2;
    border-radius: 8px; padding: 10px 14px;
    color: #c62828; font-size: 0.85rem; margin-bottom: 20px;
    display: none; text-align: center;
  }
  .error-msg.show { display: block; }

  @media (max-width: 768px) {
    .left-panel { display: none; }
    .right-panel { width: 100%; }
  }
</style>
</head>
<body>

<!-- Left Branding Panel -->
<div class="left-panel">
  <div class="grid-overlay"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="logo-area">
    <div class="logo-badge">
      <div class="logo-text">
        <span class="v">V</span><span class="accent">P</span><span class="v">EI</span>
      </div>
    </div>
    <div class="brand-title">Vietnam Port<br>Emission Inventory</div>
    <div class="brand-sub">Carbon Monitoring &amp; ESG Platform</div>
  </div>
</div>

<!-- Right Form Panel -->
<div class="right-panel">
  <div class="form-card">
    <div class="form-title">SIGN IN</div>

    <div class="error-msg" id="errorMsg">
      ⚠ Email hoặc mật khẩu không chính xác. Vui lòng thử lại.
    </div>

    <div class="form-group">
      <label for="email">Email (Username)</label>
      <input type="email" id="email" placeholder="example@company.com" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" value="123123123">
        <button class="toggle-pwd" onclick="togglePassword()" id="eyeBtn">👁</button>
      </div>
    </div>

    <div class="form-options">
      <a href="#" class="forgot">Forgot Password?</a>
      <label class="remember">
        <input type="checkbox"> Remember Me
      </label>
    </div>

    <button class="btn-signin" onclick="handleLogin()">[ SIGN IN ]</button>

    <div class="form-hint">
      If you forgot your login email, please contact<br>
      <strong>VPEI Administrator</strong>.
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    const pwd = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      btn.textContent = '🙈';
    } else {
      pwd.type = 'password';
      btn.textContent = '👁';
    }
  }

  function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const err = document.getElementById('errorMsg');

    if (email === 'vpeiadmin' && password === '123123123') {
      err.classList.remove('show');
      window.location.href = 'dashboard.html';
    } else {
      err.classList.add('show');
      document.getElementById('email').style.borderColor = '#ef5350';
      document.getElementById('password').style.borderColor = '#ef5350';
      setTimeout(() => {
        document.getElementById('email').style.borderColor = '';
        document.getElementById('password').style.borderColor = '';
      }, 2000);
    }
  }

  // Enter key support
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
